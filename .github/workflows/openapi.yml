name: OpenAPI Validation

on:
  push:
    branches: [main, develop]
    paths:
      - "api/**"
      - "packages/registry/**"
      - "packages/finance/**/manifest.ts"
      - "packages/utilities/**/manifest.ts"
      - "packages/developer/**/manifest.ts"
  pull_request:
    branches: [main, develop]
    paths:
      - "api/**"
      - "packages/registry/**"
      - "packages/finance/**/manifest.ts"
      - "packages/utilities/**/manifest.ts"
      - "packages/developer/**/manifest.ts"

jobs:
  validate-openapi:
    name: Validate OpenAPI spec
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4.4.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      - name: Start API server (background)
        run: node api/dist/server.js &
        env:
          PORT: 3001
          NODE_ENV: production

      - name: Wait for API to be ready
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://127.0.0.1:3001/health > /dev/null; then
              echo "API is ready"
              break
            fi
            echo "Waiting... ($i/15)"
            sleep 2
          done

      - name: Fetch and validate OpenAPI spec
        run: |
          curl -sf http://127.0.0.1:3001/api/v1/openapi.json | \
            npx @redocly/cli lint --format github-actions /dev/stdin

      - name: Save spec artifact
        if: always()
        run: |
          curl -sf http://127.0.0.1:3001/api/v1/openapi.json -o openapi.json || true

      - name: Upload OpenAPI spec
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: openapi-spec
          path: openapi.json
          retention-days: 7
