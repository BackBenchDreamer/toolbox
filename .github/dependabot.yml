version: 2
updates:
  # npm dependencies — root workspace
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    ignore:
      # Zod 4 is a full API rewrite — all schemas must be migrated first.
      # Re-enable when a dedicated zod-4-migration branch is ready.
      - dependency-name: "zod"
        update-types: ["version-update:semver-major"]
    groups:
      # Keep TypeScript toolchain updates together
      typescript-toolchain:
        patterns:
          - "typescript"
          - "@typescript-eslint/*"
          - "tsup"
          - "tsx"
      # Keep test toolchain together
      test-toolchain:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "supertest"
          - "@types/supertest"
      # Keep Next.js and React together — major versions excluded until
      # a dedicated migration is planned (Next.js 16 breaks CI).
      nextjs:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
