name: "💡 Feature Request"
description: "Suggest a new feature or improvement to an existing tool"
labels: ["enhancement", "needs-triage"]
assignees: []
body:
  - type: textarea
    id: summary
    attributes:
      label: What would you like to see?
      description: A clear summary of the feature you're proposing.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Why is this useful?
      description: Describe the problem this solves or the value it adds.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: If you have a specific implementation in mind, describe it here.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you considered and why you rejected them.

  - type: checkboxes
    id: contribution
    attributes:
      label: Are you willing to contribute a PR?
      options:
        - label: Yes, I'd like to implement this
        - label: I can help with testing
        - label: I can help with documentation
